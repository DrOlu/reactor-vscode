name: Sync Upstream & Publish

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    name: Sync from pi0/pi-vscode
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.compare.outputs.upstream_version }}
      upstream_version: ${{ steps.compare.outputs.upstream_version }}
      has_update: ${{ steps.compare.outputs.has_update }}

    steps:
      - name: Checkout reactor-vscode
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Hyperspace Technologies"
          git config user.email "hyperspace@hyperspace.ng"

      - name: Fetch upstream
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/pi0/pi-vscode.git
          git fetch upstream main

      - name: Check upstream version vs current
        id: compare
        run: |
          UPSTREAM_VERSION=$(git show upstream/main:package.json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          CURRENT_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")

          # Store last synced SHA in repo (create if missing)
          LAST_SHA=$(cat .upstream-sha 2>/dev/null || echo "none")

          echo "Upstream: $UPSTREAM_VERSION ($UPSTREAM_SHA)"
          echo "Current:  $CURRENT_VERSION | Last synced SHA: $LAST_SHA"
          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_SHA" != "$LAST_SHA" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "🆕 Upstream has new commits since last sync"
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "✅ Already in sync with upstream — nothing to do"
          fi

      - name: Merge upstream src & configs (preserve our rebrand)
        if: steps.compare.outputs.has_update == 'true'
        run: |
          # Take only pure-code files from upstream — never touch our branding files
          git checkout upstream/main -- \
            bridge/ \
            rolldown.config.ts \
            tsconfig.json \
            pnpm-lock.yaml \
            || true

          # Selectively merge src/ files (skip constants.ts and extension.ts which hold branding)
          for f in $(git diff upstream/main --name-only -- 'src/**' | grep -v 'src/constants.ts' | grep -v 'src/extension.ts'); do
            git checkout upstream/main -- "$f" 2>/dev/null || true
          done

      - name: Update package.json version (keep our branding)
        if: steps.compare.outputs.has_update == 'true'
        run: |
          python3 << 'PYEOF'
          import json, subprocess, re

          with open('package.json') as f:
              ours = json.load(f)

          upstream_raw = subprocess.check_output(['git', 'show', 'upstream/main:package.json'])
          upstream = json.loads(upstream_raw)

          upstream_version = upstream['version']

          # Always bump our patch version to ensure a new unique publishable version.
          # Our version format: X.Y.Z where X.Y tracks upstream major.minor
          # and Z is our own patch counter on top.
          current = ours['version']  # e.g. "0.1.2"
          parts = current.split('.')
          up_parts = upstream_version.split('.')

          # If upstream version changed, adopt it as our base and reset our patch to 0
          if up_parts[:2] != parts[:2]:
              new_version = f"{up_parts[0]}.{up_parts[1]}.0"
          else:
              # Same upstream base — increment our patch counter
              new_version = f"{parts[0]}.{parts[1]}.{int(parts[2]) + 1}"

          ours['version'] = new_version
          ours['engines'] = upstream.get('engines', ours.get('engines', {}))

          # Merge devDependencies and scripts (upstream wins for new entries)
          ours['devDependencies'] = {**upstream.get('devDependencies', {}), **ours.get('devDependencies', {})}
          ours['scripts'] = {**upstream.get('scripts', {}), **ours.get('scripts', {})}

          # Remove packageManager to avoid corepack self-install issues on CI
          ours.pop('packageManager', None)

          with open('package.json', 'w') as f:
              json.dump(ours, f, indent=2)
              f.write('\n')

          print(f"✅ package.json: upstream {upstream_version} → our version {new_version}")
          PYEOF

      - name: Commit and push sync
        if: steps.compare.outputs.has_update == 'true'
        run: |
          # Record the upstream SHA we just synced so next run can detect new commits
          echo "${{ steps.compare.outputs.upstream_sha }}" > .upstream-sha
          git add -A
          git status
          NEW_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          git commit -m "chore: sync upstream ${{ steps.compare.outputs.upstream_sha[:7] }} → v${NEW_VERSION}" \
            --allow-empty
          git push origin main

  build:
    name: Build .vsix
    needs: sync
    if: needs.sync.outputs.has_update == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build & Package
        id: package
        run: |
          pnpm package
          VSIX=$(ls *.vsix | head -1)
          echo "vsix_name=$VSIX" >> $GITHUB_OUTPUT
          echo "Packaged: $VSIX ($(du -sh $VSIX | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reactor-vscode-vsix
          path: "*.vsix"
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [sync, build]
    if: needs.sync.outputs.has_update == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: reactor-vscode-vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.sync.outputs.upstream_version }}"
          name: "Reactor v${{ needs.sync.outputs.upstream_version }}"
          body: |
            🔄 Auto-synced from [pi0/pi-vscode](https://github.com/pi0/pi-vscode) v${{ needs.sync.outputs.upstream_version }}

            **Reactor** — VS Code extension by Hyperspace Technologies
            Powered by the Pi coding agent with Reactor branding.

            ## Install
            ```bash
            code --install-extension reactor-vscode-${{ needs.sync.outputs.upstream_version }}.vsix
            ```
            Or install from the [Open VSX Registry](https://open-vsx.org/extension/HyperspaceTechnologies/reactor-vscode).
          files: "*.vsix"
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-ovsx:
    name: Publish to Open VSX
    needs: [sync, build]
    if: needs.sync.outputs.has_update == 'true' && vars.PUBLISH_OVSX == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: reactor-vscode-vsix

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Publish to Open VSX
        run: |
          VSIX=$(ls *.vsix | head -1)
          echo "Publishing $VSIX to Open VSX..."
          npx ovsx publish "$VSIX" -p ${{ secrets.OVSX_TOKEN }}

  publish-marketplace:
    name: Publish to VS Code Marketplace
    needs: [sync, build]
    if: needs.sync.outputs.has_update == 'true' && vars.PUBLISH_MARKETPLACE == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: reactor-vscode-vsix

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Publish to VS Code Marketplace
        run: |
          VSIX=$(ls *.vsix | head -1)
          echo "Publishing $VSIX to VS Code Marketplace..."
          npx @vscode/vsce publish --packagePath "$VSIX"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
