name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm package

      - uses: actions/upload-artifact@v4
        with:
          name: reactor-vscode
          path: "*.vsix"
          retention-days: 30

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: reactor-vscode

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Publish to VS Code Marketplace
        if: vars.PUBLISH_MARKETPLACE == 'true'
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: vars.PUBLISH_OVSX == 'true'
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
